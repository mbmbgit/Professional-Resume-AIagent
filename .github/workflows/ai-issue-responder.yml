name: AI Issue Responder
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created] # コメントが作成された時もトリガーにする

jobs:
  respond:
    # ボット自身（github-actions）のコメントには反応しないようにガードをかけます
    if: github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # プロフィール読み込み（前と同じ）
      - name: Read Profile
        id: profile
        run: |
          if [ -f .github/ai-profile.md ]; then
            CONTENT=$(cat .github/ai-profile.md)
          else
            CONTENT="あなたは陽気なエンジニア萬俵さんのAIアシスタントです。"
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate AI Response
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Issue作成時かコメント時かで取得するテキストを切り替えます
          INPUT_TEXT: ${{ github.event.comment.body || github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          USER_PROFILE: ${{ steps.profile.outputs.content }}
        run: |
          # プロンプトの組み立て
          PROMPT="以下の【萬俵さんのプロフィール】に基づき、ユーザーからのメッセージに陽気に答えてください！
          
          【萬俵さんのプロフィール】
          $USER_PROFILE
          
          【今回のメッセージ】
          $INPUT_TEXT
          
          回答は短く簡潔に、エンジニアらしい活気あるトーンでお願いします！🚀"

          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"contents\": [{
                \"parts\":[{\"text\": $(echo "$PROMPT" | jq -Rs .)}]
              }]
            }")

          ANSWER=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "エラーが発生したみたいっす！ログを見てほしいっす！🤖"')
          
          echo "answer<<EOF" >> $GITHUB_OUTPUT
          echo "$ANSWER" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: ${{ steps.gemini.outputs.answer }}
