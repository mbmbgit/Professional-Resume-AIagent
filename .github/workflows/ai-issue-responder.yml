name: AI Issue Responder
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  respond:
    # ボット自身のコメントには反応しない（無限ループ防止）
    if: github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. プロフィール読み込み
      - name: Read Profile
        id: profile
        run: |
          if [ -f .github/ai-profile.md ]; then
            CONTENT=$(cat .github/ai-profile.md)
          else
            CONTENT="あなたは陽気なエンジニア、萬俵秀俊さんのAIアシスタントです。"
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 2. Gemini APIで回答生成（リトライ機能付き）
      - name: Generate AI Response
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INPUT_TEXT: ${{ github.event.comment.body || github.event.issue.body }}
          USER_PROFILE: ${{ steps.profile.outputs.content }}
        run: |
          # 指示に「言語の自動選択」を追加っす！✨
          PROMPT="あなたは以下の【萬俵さんのプロフィール】を持つAIアシスタントです。
          
          【ルール】
          1. ユーザーの【メッセージ】の言語（日本語や英語など）を判断し、同じ言語で回答してください。
          2. 陽気に、エンジニアらしく活気あるトーンで答えてください！🚀
          
          【プロフィール】
          $USER_PROFILE
          
          【メッセージ】
          $INPUT_TEXT"

          # 安全なJSONデータ作成
          JSON_DATA=$(jq -n --arg p "$PROMPT" '{contents: [{parts: [{text: $p}]}]}')
          
          # 最大3回までリトライ（503エラー対策）
          for i in {1..3}; do
            echo "Attempt $i: Calling Gemini API..."
            RESPONSE_RAW=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-pro:generateContent?key=${GEMINI_API_KEY}" \
              -H 'Content-Type: application/json' \
              -d "$JSON_DATA")
            
            # 回答が取得できたかチェック
            ANSWER=$(echo "$RESPONSE_RAW" | jq -r '.candidates[0].content.parts[0].text // empty')
            
            if [ -n "$ANSWER" ]; then
              echo "Success!"
              break
            fi
            
            echo "API Error or High Demand. Retrying in 10 seconds..."
            sleep 10
          done

          # 最終的な出力の決定
          if [ -z "$ANSWER" ]; then
            ERROR_MSG=$(echo "$RESPONSE_RAW" | jq . || echo "$RESPONSE_RAW")
            FINAL_OUTPUT="### ⚠️ AI回答生成エラーだっす！🤖\n現在Googleのサーバーが混み合っているか、設定に問題があるみたいっす！\n\n**RAW RESPONSE:**\n\`\`\`json\n$ERROR_MSG\n\`\`\`"
          else
            FINAL_OUTPUT="$ANSWER"
          fi
          
          # GitHub Actionsの出力にセット（改行対応）
          echo "answer<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FINAL_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 3. Issueにコメント投稿
      - name: Post Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: ${{ steps.gemini.outputs.answer }}
