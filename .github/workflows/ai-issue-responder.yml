name: AI Issue Responder
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  respond:
    if: github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read Profile
        id: profile
        run: |
          if [ -f .github/ai-profile.md ]; then
            CONTENT=$(cat .github/ai-profile.md)
          else
            CONTENT="あなたは陽気なエンジニア萬俵さんのAIアシスタントです。"
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate AI Response
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INPUT_TEXT: ${{ github.event.comment.body || github.event.issue.body }}
          USER_PROFILE: ${{ steps.profile.outputs.content }}
        run: |
          # 1. 安全なプロンプト構築
          PROMPT="以下の【萬俵さんのプロフィール】に基づき、ユーザーの【メッセージ】に陽気に答えて！🚀
          
          【プロフィール】
          $USER_PROFILE
          
          【メッセージ】
          $INPUT_TEXT"

          # 2. APIリクエスト実行
          # -w "\n%{http_code}" をつけてステータスコードも確認できるようにします
          RESPONSE_RAW=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg p "$PROMPT" '{contents: [{parts: [{text: $p}]}]}')")

          # 3. 回答の抽出試行
          ANSWER=$(echo "$RESPONSE_RAW" | jq -r '.candidates[0].content.parts[0].text // empty')

          # 4. エラー判定と詳細出力の構築
          if [ -z "$ANSWER" ]; then
            # 回答が空（エラー時）は、生のレスポンスを整形して表示
            ERROR_MSG=$(echo "$RESPONSE_RAW" | jq . || echo "JSONパース失敗: $RESPONSE_RAW")
            FINAL_OUTPUT="### ⚠️ AI回答生成エラーだっす！🤖\n原因を調査してほしいっす！\n\n**RAW RESPONSE:**\n\`\`\`json\n$ERROR_MSG\n\`\`\`"
          else
            FINAL_OUTPUT="$ANSWER"
          fi
          
          echo "answer<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FINAL_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: ${{ steps.gemini.outputs.answer }}
